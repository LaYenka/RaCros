site_name: RCS Radar Signature Toolbox
site_description: STL to Radar Cross Section computation tools
site_author: Qiskit Team
site_url: https://github.com/anomalyco/rcs-toolbox

theme:
  name: material
  palette: 
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.top

nav:
  - Home: index.md
  - STL Tools:
    - read_stl.md
    - plot_stl.md
    - nurbs_to_stl.md
  - RCS Computation:
    - compute_rcs.md
    - bem_rcs.md
  - Visualization:
    - plot_rcs.md

repo_url: https://github.com/anomalyco/rcs-toolbox
repo_name: rcs-toolbox

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true

plugins:
  - search
